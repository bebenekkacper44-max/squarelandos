version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.04
    steps:
      - checkout

      - run:
          name: Set up environment
          command: |
            echo "Setting up Android build environment..."
            sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - run:
          name: Generate project if empty
          command: |
            if [ -z "$(ls -A .)" ]; then
              echo "Generating SquareLandOS project..."
              mkdir -p app/src/main/java/com/squareland/os
              mkdir -p app/src/main/res/layout
              mkdir -p app/src/main/res/values
              mkdir -p app/src/main/assets/squareland

              cat > settings.gradle << 'EOF'
rootProject.name = "SquareLandOS"
include(":app")
EOF

              cat > build.gradle << 'EOF'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies {
        classpath "com.android.tools.build:gradle:8.5.0"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
    }
}
allprojects { repositories { google(); mavenCentral() } }
EOF

              cat > app/build.gradle << 'EOF'
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.squareland.os"
    compileSdk 34

    defaultConfig {
        applicationId "com.squareland.os"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug { debuggable true }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions { jvmTarget = "17" }
}

dependencies {
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
}
EOF

              cat > app/src/main/AndroidManifest.xml << 'EOF'
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.squareland.os">
    <uses-permission android:name="android.permission.INTERNET" />
    <application
        android:label="SquareLand OS"
        android:theme="@style/Theme.SquareLandOS">
        <activity
            android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
                <category android:name="android.intent.category.HOME" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF

              cat > app/src/main/java/com/squareland/os/MainActivity.kt << 'EOF'
package com.squareland.os

import android.os.Bundle
import android.webkit.WebView
import android.webkit.WebViewClient
import androidx.appcompat.app.AppCompatActivity

class MainActivity : AppCompatActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        val webView = WebView(this)
        setContentView(webView)
        webView.settings.javaScriptEnabled = true
        webView.settings.domStorageEnabled = true
        webView.webViewClient = WebViewClient()
        webView.loadUrl("https://squarelandos.lovable.app")
    }
}
EOF
            fi

      - run:
          name: Build APK
          command: |
            echo "Building APK..."
            ./gradlew assembleDebug --stacktrace

      - store_artifacts:
          path: app/build/outputs/apk/debug/app-debug.apk
          destination: SquareLandOS-debug.apk

workflows:
  build-apk:
    jobs:
      - build
